# ====================================================================
# Enterprise-Grade PgBouncer Connection Pooler Configuration
# Role: Database Performance optimization & Connection Pooling
# Mode: Transaction Pooling (optimized for high-frequency recipe searches)
# Target Port: 6432 (Routes traffic efficiently to backend PostgreSQL instances)
# ====================================================================

[databases]
# Map application-specific recipe database. Directs traffic to underlying raw PG port (5432)
# Any incoming request on 'recipe_app_prod' database of PgBouncer will proxy securely.
recipe_app_prod = host=127.0.0.1 port=5432 dbname=recipe_app_prod

[pgbouncer]
# --------------------------------------------------------------------
# Administrative & Connection Ports
# --------------------------------------------------------------------
logfile = /var/log/postgresql/pgbouncer.log
pidfile = /var/run/postgresql/pgbouncer.pid
listen_addr = *
listen_port = 6432

# --------------------------------------------------------------------
# Authentication Protocols
# --------------------------------------------------------------------
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
admin_users = postgres, dba_admin
stats_users = postgres, dba_admin, monitor_agent

# --------------------------------------------------------------------
# Pooling Configuration & Mode Tuning
# --------------------------------------------------------------------
# Crucial requirement: Use "transaction" pooling.
# Allows multiple clients to share a physical backend connection for each individual query/transaction,
# instead of holding it idle for the entire session lifecycle. Unlocks 10x throughput scaling.
pool_mode = transaction

# Server connection lifetime and recycle behaviors
server_reset_query = DISCARD ALL
server_check_delay = 30
server_check_query = select 1

# Maximum client connections allowed concurrently. This prevents backend systems from being overwhelmed
# by incoming web search surges. Requests beyond this are queued beautifully.
max_client_conn = 2000

# Default size of connection pool per user/database pair.
default_pool_size = 100

# Minimum persistent connections kept alive in the pool to minimize connection handshakes
min_pool_size = 20

# If database demands spike beyond default_pool_size, permit dynamic allocation up to this ceiling
reserve_pool_size = 15
reserve_pool_timeout = 3

# Upper limits of physical connections to allocate across all databases to avoid PG connection limit exhaustion
max_db_connections = 150

# --------------------------------------------------------------------
# Quality of Service (QoS) & Timeout Enforcements
# --------------------------------------------------------------------
# Terminate client connections that remain inactive without queries for too long
client_idle_timeout = 180

# Maximum duration a client request is allowed to wait in PgBouncer's queue before aborting safely
query_timeout = 15

# Connection timeouts to database backend
server_connect_timeout = 10
server_login_retry = 15

# Keep-Alive probes to detect dead sockets in downstream and upstream links
tcp_keepalive = 1
tcp_keepidle = 30
tcp_keepintvl = 10
tcp_keepcnt = 5

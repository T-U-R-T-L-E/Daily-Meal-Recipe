# ====================================================================
# Enterprise-Grade PostgreSQL Performance Optimization Configuration
# Role: Database Runtime & Performance Engineering
# Target Module: pg_stat_statements Cumulative Query Analyzer Enabled
# Memory Tuning: Tailored for high-frequency recipe matching and searches
# ====================================================================

# --------------------------------------------------------------------
# Shared Preload Libraries Configuration
# --------------------------------------------------------------------
# IMPORTANT requirement: Preload pg_stat_statements for cumulative metric gathering.
# This compiles operational records (execution frequencies, resource loads, timing averages)
# of all queries executed against the node.
shared_preload_libraries = 'pg_stat_statements'

# --------------------------------------------------------------------
# Connection Limits Configured for Connection Pooler Integration
# --------------------------------------------------------------------
# Because the application deploys PgBouncer (pooling clients on port 6432),
# the core database itself can operate with a tightly-controlled connection ceiling,
# avoiding physical thread starvation and context-switching overheads.
max_connections = 250

# --------------------------------------------------------------------
# Memory & Buffer Management (Optimized for 8GB RAM Database Node)
# --------------------------------------------------------------------
# Main buffer allocation for caching table rows and index keys
shared_buffers = 2GB

# Memory size for internal query sorting operations and hash tables before writing to disk.
# Prevents expensive disk-spill on deep recipe search counts and aggregations.
work_mem = 64MB

# Memory allocation for database maintenance tasks (building indexes, vacuum runs)
maintenance_work_mem = 512MB

# Estimated total operating cache size of the host OS and PG buffers. Helps planner use index scans.
effective_cache_size = 6GB

# --------------------------------------------------------------------
# Optimizer Tuning
# --------------------------------------------------------------------
# Standard SSD performance multiplier (reduces planner penalty for index searches)
random_page_cost = 1.1

# Enable timing metrics for disk page read and write operations inside query plans
track_io_timing = on

# --------------------------------------------------------------------
# pg_stat_statements Specific Tuning
# --------------------------------------------------------------------
# Keep a maximum of 10,000 distinct queries in memory statistics
pg_stat_statements.max = 10000

# Track 'all' queries including sub-transactions and nested execution blocks
pg_stat_statements.track = all

# Persist statistics logs securely across server restart sequences
pg_stat_statements.save = on

# Track planning times as well as execution times to capture compiler overhead
pg_stat_statements.track_planning = on

# --------------------------------------------------------------------
# Query Logging & Diagnostic Settings
# --------------------------------------------------------------------
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'

# Log any queries taking longer than 250ms (safeguard warning flags)
log_min_duration_statement = 250

# Enable statistics collector for active sessions tracking
track_activities = on
track_counts = on
